<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECO-TRACK</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Eco Track 🌿</h1>
        <h2>Hitung Karbon Anda</h2>
    </header>

    <main>
        <section>
            <div class="tombol">
                <label>
                    Masukkan Jarak Tempuh Anda (km)🛣️
                    <input type="number" id="Jarak">
                </label>

                <p>Pilih Kendaraan 🚗 🏍️</p>
                <select id="Kendaraan">
                    <option value="Mobil">Mobil🚗</option>
                    <option value="Motor">Motor🏍️</option>
                </select>

                <p>Durasi Penggunaan AC (Jam)❄️ 🌬️</p>
                <input type="number" id="AC">

                <p>Durasi Penggunaan LAPTOP (Jam)💻</p>
                <input type="number" id="LAPTOP">

                <div id="tombolhitung">
                    <br><br>
                    <button id="Hitung">Hitung</button>
                    <button id="Reset">Reset</button>
                </div>

                <div id="HasilEmisi">

                </div>
            </div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
